name: CD

# CD handles:
#  - Release on workflow_dispatch (semantic-release -> tag -> goreleaser -> publish)
#  - Tag push -> goreleaser publish (still works for manual `git tag v*` && `git push --tags` flow)
#  - Docs deploy on push to main when docs/** changes (Cloudflare Pages)
#  - Optional sync-secrets job that pulls /skret/ci/* from AWS SSM and pushes
#    them to GitHub Actions repository secrets (opt-in via vars.SYNC_SECRETS_ENABLED)
#
# Repo Secrets required:
#   GITHUB_TOKEN             - built-in
#   AWS_ROLE_ARN             - OIDC role with read on /skret/ci/* in SSM
#   CI_APP_KEY               - n24q02m-ci GitHub App private key (for skret sync to push GH Actions secrets)
#   CLOUDFLARE_API_TOKEN     - CF Pages deploy
#   CLOUDFLARE_ACCOUNT_ID    - CF account ID
#   TAP_GITHUB_TOKEN         - fine-grained PAT for tap repo updates
#
# Repo Variables required:
#   CI_APP_ID                - n24q02m-ci GitHub App ID (3200052)
#   SYNC_SECRETS_ENABLED     - set to "true" to enable the SSM->GH-Actions sync job

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/cd.yml"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ==================== Release (workflow_dispatch) ====================
  release:
    name: Semantic Release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - id: release
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ github.event.inputs.release_type == 'beta' }}
          prerelease_token: beta
      - if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@310a9983a0ae878b29f3aac778d7c77c1db27378 # v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

  # ==================== Goreleaser ====================
  # Triggered by:
  #  - tag push (git tag v* && git push --tags)
  #  - semantic-release output (workflow_dispatch flow above)
  goreleaser:
    name: Build and Publish Binaries
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && needs.release.outputs.released == 'true')
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.tag || github.ref }}
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin goreleaser to the exact tag semantic-release produced.
          # Without this, git-describe is ambiguous when a stable tag and
          # a prerelease tag (e.g. v1.5.1 + v1.5.1-beta.1) point at the same
          # commit, and goreleaser may pick the wrong one (duplicate-asset 422).
          GORELEASER_CURRENT_TAG: ${{ needs.release.outputs.tag }}
          # Fine-grained PAT with `contents:write` on
          # n24q02m/homebrew-tap + n24q02m/scoop-bucket. Goreleaser
          # uses this to push formula/manifest updates on release.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

  # ==================== Sync Secrets (opt-in) ====================
  # Pulls /skret/ci/* from AWS SSM and pushes the values into this repo's
  # GitHub Actions secrets. Opt-in via vars.SYNC_SECRETS_ENABLED.
  #
  # Uses an n24q02m-ci App token (consistent with the rest of the n24q02m
  # repos). Requires `Secrets: Read & write` granted on the App and accepted
  # on the skret installation.
  sync-secrets:
    name: Sync Secrets from AWS SSM
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      !startsWith(github.ref, 'refs/tags/v') &&
      vars.SYNC_SECRETS_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Build skret
        run: go build -o skret ./cmd/skret
      - name: Write minimal .skret.yaml for CI invocation
        run: |
          cat > .skret.yaml <<EOF
          version: "1"
          default_env: prod
          environments:
            prod:
              provider: aws
              path: /skret/ci
              region: ap-southeast-1
          EOF
      - name: Sync secrets to GitHub
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ./skret sync --to=github \
            --github-repo=${{ github.repository }} \
            -e prod

  # ==================== Docs Deploy ====================
  docs:
    name: Deploy Docs to Cloudflare Pages
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile
      - name: Sync install scripts into docs/public
        run: |
          cp install.sh docs/public/install.sh
          cp install.ps1 docs/public/install.ps1
      - name: Build Astro Starlight site
        working-directory: docs
        run: pnpm astro build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/dist --project-name=skret --branch=main
