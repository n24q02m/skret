name: CD

# CD handles:
#  - Release on workflow_dispatch (semantic-release -> tag -> goreleaser -> publish)
#  - Tag push -> goreleaser publish (still works for manual `git tag v*` && `git push --tags` flow)
#  - Docs deploy on push to main when docs/** changes (Cloudflare Pages)
#  - Optional sync-secrets job that pulls /skret/ci/* from AWS SSM and pushes
#    them to GitHub Actions repository secrets (opt-in via vars.SYNC_SECRETS_ENABLED)
#
# Repo Secrets required:
#   GITHUB_TOKEN             - built-in
#   AWS_ROLE_ARN             - OIDC role with read on /skret/ci/* in SSM
#   CI_APP_KEY               - n24q02m-ci GitHub App private key (for skret sync to push GH Actions secrets)
#   CLOUDFLARE_API_TOKEN     - CF Pages deploy
#   CLOUDFLARE_ACCOUNT_ID    - CF account ID
#   TAP_GITHUB_TOKEN         - fine-grained PAT for tap repo updates
#
# Repo Variables required:
#   CI_APP_ID                - n24q02m-ci GitHub App ID (3200052)
#   SYNC_SECRETS_ENABLED     - set to "true" to enable the SSM->GH-Actions sync job

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/cd.yml"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: write
  packages: write
  id-token: write
  deployments: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ==================== Release (workflow_dispatch) ====================
  release:
    name: Semantic Release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - id: release
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ github.event.inputs.release_type == 'beta' }}
          prerelease_token: beta
      - if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

  # ==================== Goreleaser ====================
  # Triggered by:
  #  - tag push (git tag v* && git push --tags)
  #  - semantic-release output (workflow_dispatch flow above)
  goreleaser:
    name: Build and Publish Binaries
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && needs.release.outputs.released == 'true')
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.tag || github.ref }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT with `contents:write` on
          # n24q02m/homebrew-tap + n24q02m/scoop-bucket. Goreleaser
          # uses this to push formula/manifest updates on release.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

  # ==================== Sync Secrets (opt-in) ====================
  # Pulls /skret/ci/* from AWS SSM and pushes the values into this repo's
  # GitHub Actions secrets. Opt-in via vars.SYNC_SECRETS_ENABLED to avoid
  # breaking pushes when CI_APP_KEY / SSM bootstrap is incomplete.
  sync-secrets:
    name: Sync Secrets from AWS SSM
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      !startsWith(github.ref, 'refs/tags/v') &&
      vars.SYNC_SECRETS_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}
      - uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build skret
        run: go build -o skret ./cmd/skret
      - name: Sync secrets to GitHub
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ./skret sync --to=github \
            --github-repo=${{ github.repository }} \
            --provider=aws \
            --path=/skret/ci/ \
            --region=ap-southeast-1

  # ==================== Docs Deploy ====================
  docs:
    name: Deploy Docs to Cloudflare Pages
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile
      - name: Sync install scripts into docs/public
        run: |
          cp install.sh docs/public/install.sh
          cp install.ps1 docs/public/install.ps1
      - name: Build Astro Starlight site
        working-directory: docs
        run: pnpm astro build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/dist --project-name=skret --branch=main
