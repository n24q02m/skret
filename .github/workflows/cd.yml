name: CD

# CD handles:
#  - Release on workflow_dispatch (semantic-release -> tag -> goreleaser -> publish)
#  - Tag push -> goreleaser publish (still works for manual `git tag v*` flow)
#  - Docs deploy on push to main when docs/** changes (Cloudflare Pages)
#
# Secrets required:
#   GITHUB_TOKEN             - built-in
#   CLOUDFLARE_API_TOKEN     - CF Pages deploy (scope: Pages:Edit)
#   CLOUDFLARE_ACCOUNT_ID    - CF account ID
#
# TODO(v0.1.0-GA): migrate CLOUDFLARE_* from GitHub Secrets to AWS SSM
# under /skret/ci/* and use `skret sync --to=github` to round-trip back.
# Until then, set via `gh secret set` as a bootstrap step (one-time).

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/cd.yml"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: write
  packages: write
  id-token: write
  deployments: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ==================== Release (workflow_dispatch) ====================
  release:
    name: Semantic Release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - id: release
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ github.event.inputs.release_type == 'beta' }}
          prerelease_token: beta
      - if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

  # ==================== Goreleaser ====================
  # Triggered by:
  #  - tag push (git tag v* && git push --tags)
  #  - semantic-release output (workflow_dispatch flow above)
  goreleaser:
    name: Build and Publish Binaries
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && needs.release.outputs.released == 'true')
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.tag || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== Docs Deploy ====================
  docs:
    name: Deploy Docs to Cloudflare Pages
    if: |
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile
      - name: Sync install scripts into docs/public
        run: |
          cp install.sh docs/public/install.sh
          cp install.ps1 docs/public/install.ps1
      - name: Build Astro Starlight site
        working-directory: docs
        run: pnpm astro build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/dist --project-name=skret --branch=main
