name: Demo GIF

on:
  push:
    branches: [main]
    paths:
      - "demo.tape"
      - ".github/workflows/demo.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - name: Install VHS toolchain (ffmpeg + ttyd + vhs)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-jetbrains-mono
          # ttyd: install from official release (apt package missing on Noble)
          curl -sSL -o /tmp/ttyd https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64
          chmod +x /tmp/ttyd && sudo mv /tmp/ttyd /usr/local/bin/ttyd
          # vhs: install via Go since vhs-action ffmpeg install broken on Ubuntu 24.04 (upstream #459)
          go install github.com/charmbracelet/vhs@latest
      - name: Build skret
        run: |
          go build -o /usr/local/bin/skret ./cmd/skret
          skret --version
      - name: Render demo.gif
        run: |
          export PATH="$HOME/go/bin:$PATH"
          vhs demo.tape
      - name: Copy demo.gif into docs/public
        run: |
          mkdir -p docs/public
          cp demo.gif docs/public/demo.gif
      - name: Upload demo.gif artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: demo-gif
          path: |
            demo.gif
            docs/public/demo.gif
          retention-days: 30
      - name: Open PR with updated demo.gif
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: "feat: regenerate demo.gif"
          title: "feat: regenerate demo.gif"
          body: "Auto-generated by Demo GIF workflow. Review the render visually before merging."
          branch: chore/regenerate-demo-gif
          delete-branch: true
          add-paths: |
            demo.gif
            docs/public/demo.gif
