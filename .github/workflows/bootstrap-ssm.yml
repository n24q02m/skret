name: Bootstrap /skret/ci SSM (one-shot)

# One-shot manual workflow that copies the existing GH Actions secrets
# CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID into AWS SSM under /skret/ci/.
# Run once via `gh workflow run bootstrap-ssm.yml -R n24q02m/skret`.
# Delete this file in a follow-up PR after verifying the SSM values.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build skret
        run: go build -o skret ./cmd/skret
      - name: Write minimal .skret.yaml for CI invocation
        run: |
          cat > .skret.yaml <<EOF
          version: "1"
          default_env: prod
          environments:
            prod:
              provider: aws
              path: /skret/ci
              region: ap-southeast-1
          EOF
      - name: Put CLOUDFLARE_API_TOKEN into /skret/ci
        env:
          VALUE: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: ./skret set CLOUDFLARE_API_TOKEN "$VALUE" -e prod
      - name: Put CLOUDFLARE_ACCOUNT_ID into /skret/ci
        env:
          VALUE: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./skret set CLOUDFLARE_ACCOUNT_ID "$VALUE" -e prod
      - name: Verify
        run: ./skret list -e prod
