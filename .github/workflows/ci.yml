name: CI

on:
  push:
    branches: [main, "dev/**"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, ready_for_review]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title:
    name: PR Title Lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            perf
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject must not start with an uppercase character.

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: latest

  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - name: Run tests with coverage
        shell: bash
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./internal/...
          go test -race -coverprofile=coverage-pkg.out -covermode=atomic ./pkg/skret/...
      - name: Check internal coverage threshold
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Internal coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 90" | bc -l) )); then
            echo "Internal coverage ${COVERAGE}% is below 90% threshold"
            exit 1
          fi
      - name: Check pkg/skret coverage threshold
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          COVERAGE=$(go tool cover -func=coverage-pkg.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "pkg/skret coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 95" | bc -l) )); then
            echo "pkg/skret coverage ${COVERAGE}% is below 95% threshold"
            exit 1
          fi
      - name: Run E2E tests
        shell: bash
        run: go test -count=1 ./tests/e2e/...
      - uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        if: matrix.os == 'ubuntu-latest'
        with:
          file: ./coverage.out
          fail_ci_if_error: false
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: matrix.os == 'ubuntu-latest'
        with:
          name: coverage
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY=skret
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY=skret.exe
          fi
          go build -ldflags="-s -w -X github.com/n24q02m/skret/internal/version.Version=ci-${{ github.sha }}" -o $BINARY ./cmd/skret

  # CodeQL handled by GitHub default setup (repo Settings > Security > Code
  # Scanning). Running an advanced workflow here would clash with default
  # setup ("CodeQL analyses from advanced configurations cannot be processed
  # when the default setup is enabled"). If we later need custom query
  # packs, flip default setup off and restore the advanced workflow.

  installer-lint:
    name: Installer scripts lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: ShellCheck install.sh
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca # master
        with:
          scandir: "."
          additional_files: "install.sh"
          severity: warning
      - name: PSScriptAnalyzer install.ps1
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Invoke-ScriptAnalyzer -Path install.ps1 -Severity Warning -EnableExit

  installer-smoke:
    name: Installer smoke test (${{ matrix.os }})
    # Gate behind workflow_dispatch for PRs: the scripts hit the live GitHub API
    # for the latest release tag, and we do not want a PR's CI to block on external
    # reachability or hit rate limits on every push. Run on demand or on tag.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install via install.sh (Unix)
        if: runner.os != 'Windows'
        run: |
          ./install.sh --user --quiet
          "$HOME/.local/bin/skret" --version
      - name: Install via install.ps1 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\install.ps1 -Quiet
          & "$env:LOCALAPPDATA\Programs\skret\skret.exe" --version

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
