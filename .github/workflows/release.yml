name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: write
  id-token: write

jobs:
  version_bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      
      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v8
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # if release_type is beta, then use prerelease mode
          prerelease: ${{ github.event.inputs.release_type == 'beta' }}
          prerelease_token: 'beta'