repos:
  - repo: local
    hooks:
      - id: enforce-commit
        name: Enforce feat and fix commit prefixes
        entry: bash scripts/enforce-commit.sh
        language: system
        stages: [commit-msg]

      - id: golangci-lint
        name: golangci-lint
        entry: sh -c "golangci-lint run"
        language: system
        files: \.go$
        pass_filenames: false

      - id: gofumpt
        name: gofumpt
        entry: sh -c "gofumpt -w cmd internal"
        language: system
        files: \.go$
        pass_filenames: false

      - id: go-test
        name: go test
        entry: sh -c "go test ./..."
        language: system
        files: \.go$
        pass_filenames: false
