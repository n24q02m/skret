version: 2

builds:
  - id: skret
    main: ./cmd/skret
    binary: skret
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/n24q02m/skret/internal/version.Version={{.Version}}
      - -X github.com/n24q02m/skret/internal/version.Commit={{.Commit}}
      - -X github.com/n24q02m/skret/internal/version.Date={{.Date}}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "skret_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# brews/scoops disabled until tap/bucket repos are created
# brews:
#   - repository:
#       owner: n24q02m
#       name: homebrew-tap
#     homepage: "https://github.com/n24q02m/skret"
#     description: "Cloud-provider secret manager CLI wrapper"
#     license: "MIT"
#
# scoops:
#   - repository:
#       owner: n24q02m
#       name: scoop-bucket
#     homepage: "https://github.com/n24q02m/skret"
#     description: "Cloud-provider secret manager CLI wrapper"
#     license: MIT

dockers:
  - image_templates:
      - "ghcr.io/n24q02m/skret:{{ .Version }}"
      - "ghcr.io/n24q02m/skret:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.source=https://github.com/n24q02m/skret"

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    env:
      - COSIGN_EXPERIMENTAL=1
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

changelog:
  sort: asc
  filters:
    exclude:
      - "^Merge"
