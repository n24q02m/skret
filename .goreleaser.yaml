version: 2

builds:
  - id: skret
    main: ./cmd/skret
    binary: skret
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/n24q02m/skret/internal/version.Version={{.Version}}
      - -X github.com/n24q02m/skret/internal/version.Commit={{.Commit}}
      - -X github.com/n24q02m/skret/internal/version.Date={{.Date}}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "skret_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: n24q02m
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://skret.n24q02m.com"
    description: "Cloud-provider secret manager CLI with Doppler/Infisical-grade DX"
    license: "MIT"
    install: |
      bin.install "skret"
      generate_completions_from_executable(bin/"skret", "completion")
    test: |
      assert_match "skret version", shell_output("#{bin}/skret --version")
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    commit_msg_template: "feat: bump skret to {{ .Tag }}"

scoops:
  - repository:
      owner: n24q02m
      name: scoop-bucket
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: bucket
    homepage: "https://skret.n24q02m.com"
    description: "Cloud-provider secret manager CLI with Doppler/Infisical-grade DX"
    license: MIT
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    commit_msg_template: "feat: bump skret to {{ .Tag }}"

dockers:
  - image_templates:
      - "ghcr.io/n24q02m/skret:{{ .Version }}"
      - "ghcr.io/n24q02m/skret:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.source=https://github.com/n24q02m/skret"

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    env:
      - COSIGN_EXPERIMENTAL=1
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

changelog:
  sort: asc
  filters:
    exclude:
      - "^Merge"
